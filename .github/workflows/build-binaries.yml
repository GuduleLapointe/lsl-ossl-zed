name: Build LSP binaries

on:
  push:
    paths:
      - 'lsp/src/**'
      - 'lsp/Cargo.toml'
      - 'lsp/build.rs'
      - 'grammar/src/parser.c'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: lsl-lsp-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: lsl-lsp-macos-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: lsl-lsp-linux-aarch64
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: lsl-lsp-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: lsl-lsp-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        working-directory: lsp
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: cp lsp/target/${{ matrix.target }}/release/lsl-lsp lsp/prebuilt/${{ matrix.asset_name }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item lsp\target\${{ matrix.target }}\release\lsl-lsp.exe lsp\prebuilt\${{ matrix.asset_name }}

      - name: Commit binary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lsp/prebuilt/${{ matrix.asset_name }}
          git diff --cached --quiet || git commit -m "Build lsl-lsp binary: ${{ matrix.asset_name }}"
          git push
